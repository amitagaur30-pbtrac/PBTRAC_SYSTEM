{% extends "base.html" %}

{% block content %}

<div class="login-card">

    <h2>Administrator Login</h2>

    <p>
        Punjab Transparency & Accountability Commission
    </p>

    {% if error %}

    <div class="error-box">
        {{ error }}
    </div>

    {% endif %}

    <form method="POST">

        <label>Username</label>

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <label>Password</label>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

</div>


<style>

.login-card{

    width:400px;

    margin:50px auto;

    background:white;

    padding:40px;

    border-radius:15px;

    box-shadow:0 4px 20px rgba(0,0,0,0.15);

}

.login-card h2{

    text-align:center;

    color:#003366;

    margin-bottom:10px;
}

.login-card p{

    text-align:center;

    color:#666;

    margin-bottom:30px;
}

.login-card label{

    display:block;

    margin-top:15px;

    margin-bottom:8px;

    font-weight:bold;

    color:#333;
}

.login-card input{

    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:15px;

    box-sizing:border-box;
}

.login-card button{

    width:100%;

    margin-top:30px;

    padding:14px;

    background:#003366;

    color:white;

    border:none;

    border-radius:8px;

    font-size:16px;

    cursor:pointer;
}

.login-card button:hover{

    background:#0055a5;
}

.error-box{

    background:#ffe5e5;

    color:#b30000;

    padding:12px;

    border-radius:8px;

    margin-bottom:20px;

    text-align:center;
}

</style>

{% endblock %}
